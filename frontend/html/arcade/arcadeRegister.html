<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>gameZone - Arcade</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>

  <body class="bgcolor-darkblue font-white">
    <div class="bgcolor-nav bg-nav">
      <ul class="kk">
        <a class="btn-ghost deco font-white" href="../index.html">Home</a>
        <a class="btn-ghost deco font-white" href="../shop/shop.html">Shop</a>
        <a class="btn deco font-white" href="../arcade/arcade.html">Arcade</a>
        <a class="btn-ghost deco font-white" href="../wallet/wallet.html"
          >Wallet</a
        >
        <a class="btn-ghost deco font-white" href="../profile/profile.html"
          >Profile</a
        >
      </ul>
    </div>

    <div>
      <h1>Arcade</h1>

      <a class="btn deco font-white" href="arcade.html">Matchmaking</a>
      <br />
      <a class="btn-ghost deco font-white" href="arcadeTeams.html">Teams</a>
      <br />

      <div>
        <p><strong>Register</strong></p>
        <p><a class="submit-btn deco" href="arcade.html">Return</a></p>

        <p><strong>Choose your teammates</strong></p>

        <form action="#" method="post">
          <fieldset class="account-card">
            <legend>Team Registration</legend>

            <p>
              <label for="team">Teammates:</label>
              <select class="input-field" type="select" name="team" id="team">
                <option value="1">Bat (Legend)</option>
                <option value="2">Bolor (Legend)</option>
                <option value="3">Bat2 (Legend)</option>
                <option value="4">Bat3 (Legend)</option>
                <option value="5">Bat4 (Legend)</option>
                <option value="6">Bat5 (Legend)</option>
                <option value="7">Bat6 (Legend)</option>
              </select>
            </p>

            <p>
              <label for="bet">Input your bet value</label>
              <input class="input-field" type="text" name="bet" />
            </p>

            <p>
              <strong>Total Balance:</strong>
              <span>100000</span>
            </p>

            <p>
              <label for="rechargeValue">Recharge value:</label>
              <input class="input-field" type="text" name="rechargeValue" />
              <input
                class="submit-btn"
                type="submit"
                name="recharge"
                value="Recharge"
              />
            </p>

            <p>
              <label for="bet">Bet Value</label>
              <input class="input-field" type="text" name="bet value" />
            </p>

            <p class="kk">
              <input class="submit-btn" type="submit" value="Create" />
              <input class="btn-ghost font-white" type="reset" value="Reset" />
            </p>
          </fieldset>
        </form>
      </div>
    </div>
  </body>
</html>
