<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>gameZone - Add Team</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>

  <body class="bgcolor-darkblue font-white">
    <div class="bgcolor-nav bg-nav">
      <ul class="kk">
        <a class="btn-ghost deco font-white" href="../index.html">Home</a>
        <a class="btn-ghost deco font-white" href="../shop/shop.html">Shop</a>
        <a class="btn deco font-white" href="../arcade/arcade.html"
          >Arcade</a
        >
        <a class="btn-ghost deco font-white" href="../wallet/wallet.html"
          >Wallet</a
        >
        <a class="btn-ghost deco font-white" href="../profile/profile.html"
          >Profile</a
        >
      </ul>
    </div>

    <div>
      <h1>Add Team</h1>
    </div>

    <div class="container">
      <h2>Create Your Team</h2>

      <form action="#" method="post">
        <fieldset class="account-card">
          <legend>Team Information</legend>

          <p>
            <label for="name">Team Name:</label>
            <input class="input-field" type="text" name="name" id="name" value="" />
          </p>

          <p>
            <label for="players">Select your teammates:</label>
            <select class="input-field" name="players" id="players">
              <option value="player1">Player1</option>
              <option value="player2">Player2</option>
              <option value="player3">Player3</option>
            </select>
          </p>

          <p>
            <input class="submit-btn" type="submit" value="Post" />
          </p>
        </fieldset>
      </form>
    </div>
  </body>
</html>
