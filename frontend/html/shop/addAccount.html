<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>gameZone - Add Account</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>

  <body class="bgcolor-darkblue font-white">
    <div class="bgcolor-nav bg-nav">
      <ul class="kk">
        <a class="btn-ghost deco font-white" href="../index.html">Home</a>
        <a class="btn deco font-white" href="../shop/shop.html">Shop</a>
        <a class="btn-ghost deco font-white" href="../arcade/arcade.html"
          >Arcade</a
        >
        <a class="btn-ghost deco font-white" href="../wallet/wallet.html"
          >Wallet</a
        >
        <a class="btn-ghost deco font-white" href="../profile/profile.html"
          >Profile</a
        >
      </ul>
    </div>

    <div>
      <h1>Account Marketplace</h1>
    </div>

    <div class="add-account-link">
      <a class="btn-ghost deco font-white" href="shop.html">Add Account</a>
    </div>

    <div class="container">
      <h2>Add Your Account</h2>

      <form action="#" method="post" enctype="multipart/form-data">
        <fieldset>
          <legend>Account Info</legend>

          <p>
            <label for="name">Account Name:</label>
            <input class="input-field" type="text" name="name" id="name" placeholder="Add Name" />

          </p>

          <p>
            <label for="skins">Number of Skins:</label>
            <input class="input-field" type="number" name="skins" id="skins" placeholder="Select Number of Skin" />
          </p>

          <p>
            <label for="winrate">Win Rate (%):</label>
            <input class="input-field" type="text" name="winrate" />
          </p>

          <p>
            <label for="price">Price ($):</label>
            <input class="input-field" type="text" name="price" />
          </p>

          <p>
            <label for="image">Account Image:</label>
            <input
              class="input-field-file"
              type="file"
              name="image"
              id="image"
              accept="image/*"
            />
          </p>

          <p>
            <input type="submit" value="Post" class="submit-btn" />
          </p>
        </fieldset>
      </form>
    </div>
    </div>
  </body>
</html>
