<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameZone – Account Shop</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon">⚔️</div>
          <h1 class="logo-text">gameZone</h1>
        </div>
      </div>

      <nav>
        <ul class="div-menu">
          <li>
            <a href="../index.html" class="nav-item nav-item-inactive"
              ><span class="nav-icon">🏠</span
              ><span class="nav-label">Home</span></a
            >
          </li>
          <li>
            <a href="profile.html" class="nav-item nav-item-inactive"
              ><span class="nav-icon">👤</span
              ><span class="nav-label">Profile</span></a
            >
          </li>
          <li>
            <a href="shop.html" class="nav-item nav-item-active"
              ><span class="nav-icon">🛒</span
              ><span class="nav-label">Shop</span></a
            >
          </li>
          <li>
            <a href="arcade.html" class="nav-item nav-item-inactive"
              ><span class="nav-icon">🎮</span
              ><span class="nav-label">Arcade</span></a
            >
          </li>
          <li>
            <a href="teams.html" class="nav-item nav-item-inactive"
              ><span class="nav-icon">👥</span
              ><span class="nav-label">Teams</span></a
            >
          </li>
          <li>
            <a href="wallet.html" class="nav-item nav-item-inactive"
              ><span class="nav-icon">$</span
              ><span class="nav-label">Wallet</span></a
            >
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">GU</div>
          <div class="user-info">
            <div class="user-name">Guest User</div>
            <div class="user-status">Online</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-container">
        <header class="page-header">
          <h1 class="page-title">Account Marketplace</h1>
        </header>

        <section class="search-section">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input
              id="searchInput"
              type="text"
              class="input-search"
              placeholder="Search by rank, title or price..."
            />
          </div>
          <button id="searchBtn" class="btn-primary">Search</button>
          <div class="price-filters">
            <div class="filter-group">
              <label for="minPriceInput">Min Price:</label>
              <input type="number" id="minPriceInput" placeholder="0" min="0" />
            </div>
            <div class="filter-group">
              <label for="maxPriceInput">Max Price:</label>
              <input
                type="number"
                id="maxPriceInput"
                placeholder="1000"
                min="0"
              />
            </div>
          </div>
        </section>

        <div id="filterInfo" class="filter-status"></div>

        <section id="shopGrid" class="shop-grid">
          <div class="loading-state">
            <p>Loading market data...</p>
          </div>
        </section>
      </div>
    </main>

    <div id="accountModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script type="module" src="../js/shop/shop.js"></script>
  </body>
</html>
